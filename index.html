<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yosemite Vlog</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:black;
      overflow:hidden;
      font-family:Arial;
    }

    video{
      width:100vw;
      height:100vh;
      object-fit:cover;
    }

    h1{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);

      color:white;
      font-size:5rem;
      letter-spacing:10px;
    }

  </style>
</head>

<body>

  <video autoplay muted loop controls>
    <source src="videos/vlog_fixed.mp4" type="video/mp4">
  </video>

  <h1>YOSEMITE</h1>

</body>
</html>ß
