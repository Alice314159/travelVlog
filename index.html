<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yosemite Vlog</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:black;
}

/* FULL SCREEN VIDEO */
video{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;
}

/* DARK OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.3);
}

/* TITLE */
h1{
    position:absolute;
    top:50%;
    left:50%;

    transform:translate(-50%, -50%);

    color:white;
    font-size:6rem;
    letter-spacing:8px;

    z-index:2;
}

</style>
</head>

<body>

    <video autoplay muted loop controls>
        <source src="videos/vlog_fixed.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <h1>YOSEMITE</h1>

</body>
</html>
